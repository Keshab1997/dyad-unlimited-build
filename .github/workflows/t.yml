name: Build Pro
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: git clone https://github.com/dyad-sh/dyad.git s
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: cd s && npm install --ignore-scripts
      - run: cd s && python3 -c "c=open('src/main/settings.ts').read();c=c.replace('providerSettings: {},','providerSettings: { auto: { apiKey: { value: \"patched\" } } },',1);open('src/main/settings.ts','w').write(c);print('ok')"
