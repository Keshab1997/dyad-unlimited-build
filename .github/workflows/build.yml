name: Build Dyad (Unlimited Agent + Pro) [Intel x64]

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone Dyad source
        run: git clone https://github.com/dyad-sh/dyad.git dyad-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies (no scripts)
        working-directory: ./dyad-src
        run: npm install --ignore-scripts

      - name: Pre-create binary dirs
        working-directory: ./dyad-src
        run: |
          mkdir -p node_modules/@vscode/ripgrep/bin
          echo '#!/bin/bash' > node_modules/@vscode/ripgrep/bin/rg
          chmod +x node_modules/@vscode/ripgrep/bin/rg
          mkdir -p node_modules/dugite/git/bin
          echo '#!/bin/bash' > node_modules/dugite/git/bin/git
          chmod +x node_modules/dugite/git/bin/git
          echo '#!/bin/bash' > node_modules/dugite/git/bin/scalar
          chmod +x node_modules/dugite/git/bin/scalar

      - name: Apply patches (safe approach - only defaults)
        working-directory: ./dyad-src
        run: |
          # 1. Unlimited Agent Quota
          sed -i '' 's/FREE_AGENT_QUOTA_LIMIT = 10/FREE_AGENT_QUOTA_LIMIT = 99999/' src/lib/free_agent_quota_limit.ts
          echo "✅ FREE_AGENT_QUOTA_LIMIT = 99999"

          # 2. Enable Dyad Pro by default + set dummy API key
          #    (so isDyadProEnabled returns true naturally)
          sed -i '' 's/providerSettings: {},/providerSettings: { auto: { apiKey: { value: "patched" } } },/' src/main/settings.ts
          sed -i '' 's/experiments: {},/experiments: {},
  enableDyadPro: true,/' src/main/settings.ts
          
          # 3. Enable Pro features by default
          sed -i '' 's/enableProSmartFilesContextMode: true,/enableProSmartFilesContextMode: true,
  enableProWebSearch: true,/' src/main/settings.ts
          
          echo "✅ enableDyadPro, dummy API key, Pro toggles set in defaults"

      - name: Verify patches
        working-directory: ./dyad-src
        run: |
          echo "=== FREE_AGENT_QUOTA_LIMIT ==="
          grep "FREE_AGENT_QUOTA_LIMIT" src/lib/free_agent_quota_limit.ts
          echo "=== Settings defaults ==="
          sed -n '46,80p' src/main/settings.ts

      - name: Build Dyad (Intel x64)
        working-directory: ./dyad-src
        run: npm run make -- --arch=x64
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          E2E_TEST_BUILD: "true"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dyad-unlimited-pro-intel
          path: dyad-src/out/make/**/*.zip
          if-no-files-found: warn
