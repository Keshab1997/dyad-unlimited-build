name: Build Dyad (Unlimited Agent)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout this repo (contains workflow)
        uses: actions/checkout@v4

      - name: Clone Dyad source
        run: git clone https://github.com/dyad-sh/dyad.git dyad-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Debug - check cloned content
        run: |
          ls -la dyad-src/
          ls -la dyad-src/src/lib/free_agent_quota_limit.ts 2>/dev/null || echo "FILE NOT FOUND"
          node --version
          npm --version

      - name: Install dependencies
        working-directory: ./dyad-src
        run: |
          npm install 2>&1 || echo "NPM INSTALL FAILED WITH EXIT CODE $?"

      - name: Apply FREE_AGENT_QUOTA_LIMIT patch
        working-directory: ./dyad-src
        run: |
          sed -i '' 's/FREE_AGENT_QUOTA_LIMIT = 10/FREE_AGENT_QUOTA_LIMIT = 99999/' src/lib/free_agent_quota_limit.ts
          echo "Patched limit:"
          cat src/lib/free_agent_quota_limit.ts

      - name: Build Dyad (DMG)
        working-directory: ./dyad-src
        run: npm run make
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dyad-unlimited-agent-dmg
          path: dyad-src/out/make/*.dmg
          if-no-files-found: error
