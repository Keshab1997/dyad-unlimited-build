name: Build Dyad (Unlimited Agent)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout this repo (contains workflow)
        uses: actions/checkout@v4

      - name: Clone Dyad source
        run: git clone https://github.com/dyad-sh/dyad.git dyad-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies (with retry)
        working-directory: ./dyad-src
        run: |
          for i in 1 2 3; do
            echo "=== npm install attempt $i ==="
            npm install --prefer-offline && break
            echo "Attempt $i failed, retrying in 5 seconds..."
            sleep 5
          done

      - name: Apply FREE_AGENT_QUOTA_LIMIT patch
        working-directory: ./dyad-src
        run: |
          sed -i '' 's/FREE_AGENT_QUOTA_LIMIT = 10/FREE_AGENT_QUOTA_LIMIT = 99999/' src/lib/free_agent_quota_limit.ts
          echo "Patched: FREE_AGENT_QUOTA_LIMIT = 99999"

      - name: Verify dugite git binary
        working-directory: ./dyad-src
        run: ls -la node_modules/dugite/git/bin/ 2>/dev/null && echo "✅ dugite git binary present" || echo "⚠️ dugite git binary missing"

      - name: Build Dyad (DMG)
        working-directory: ./dyad-src
        run: npm run make
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          E2E_TEST_BUILD: "true"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dyad-unlimited-agent-dmg
          path: dyad-src/out/make/*.dmg
          if-no-files-found: error
