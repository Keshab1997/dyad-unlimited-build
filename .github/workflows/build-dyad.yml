name: Build Dyad (Unlimited Agent) [Intel x64]

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone Dyad source
        run: git clone https://github.com/dyad-sh/dyad.git dyad-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies (no scripts)
        working-directory: ./dyad-src
        run: npm install --ignore-scripts

      - name: Pre-create binary dirs
        working-directory: ./dyad-src
        run: |
          mkdir -p node_modules/@vscode/ripgrep/bin
          echo '#!/bin/bash' > node_modules/@vscode/ripgrep/bin/rg
          chmod +x node_modules/@vscode/ripgrep/bin/rg
          mkdir -p node_modules/dugite/git/bin
          echo '#!/bin/bash' > node_modules/dugite/git/bin/git
          chmod +x node_modules/dugite/git/bin/git
          echo '#!/bin/bash' > node_modules/dugite/git/bin/scalar
          chmod +x node_modules/dugite/git/bin/scalar

      - name: Apply all patches (Unlimited Agent + Full Pro)
        working-directory: ./dyad-src
        run: |
          # 1. Unlimited Agent Quota
          sed -i '' 's/FREE_AGENT_QUOTA_LIMIT = 10/FREE_AGENT_QUOTA_LIMIT = 99999/' src/lib/free_agent_quota_limit.ts
          echo "✅ FREE_AGENT_QUOTA_LIMIT = 99999"

          # 2. Always return true for Pro checks
          sed -i '' 's/export function isDyadProEnabled(settings: UserSettings): boolean {/export function isDyadProEnabled(_settings: UserSettings): boolean {/' src/lib/schemas.ts
          sed -i '' 's/return settings.enableDyadPro === true && hasDyadProKey(settings);/return true; \/\/ Patched: unlimited Pro features/' src/lib/schemas.ts
          sed -i '' 's/export function hasDyadProKey(settings: UserSettings): boolean {/export function hasDyadProKey(_settings: UserSettings): boolean {/' src/lib/schemas.ts
          sed -i '' 's/return !!settings.providerSettings?.auto\.apiKey?.value;/return true; \/\/ Patched: always has Pro key/' src/lib/schemas.ts
          echo "✅ isDyadProEnabled & hasDyadProKey → always return true"

          # 3. Enable Dyad Pro by default
          sed -i '' 's/experiments: {},/experiments: {},\n  enableDyadPro: true,/' src/main/settings.ts
          grep -q "enableProWebSearch: true" src/main/settings.ts || \
            sed -i '' 's/enableProSmartFilesContextMode: true,/enableProSmartFilesContextMode: true,\n  enableProWebSearch: true,/' src/main/settings.ts
          echo "✅ enableDyadPro, enableProWebSearch = true in defaults"

      - name: Build Dyad (Intel x64)
        working-directory: ./dyad-src
        run: npm run make -- --arch=x64
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          E2E_TEST_BUILD: "true"

      - name: List output files
        working-directory: ./dyad-src
        run: find out/ -type f -name "*.zip" 2>/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dyad-unlimited-agent-intel
          path: dyad-src/out/make/**/*.zip
          if-no-files-found: warn
