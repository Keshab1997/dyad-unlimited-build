name: Build Dyad (Unlimited Agent)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout this repo (contains workflow)
        uses: actions/checkout@v4

      - name: Clone Dyad source
        run: git clone https://github.com/dyad-sh/dyad.git dyad-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies (no scripts)
        working-directory: ./dyad-src
        run: npm install --ignore-scripts

      - name: Pre-create binary dirs for packaging
        working-directory: ./dyad-src
        run: |
          # Ripgrep binary dir (app can't download it, create placeholder)
          mkdir -p node_modules/@vscode/ripgrep/bin
          # Create a dummy rg binary so packaging doesn't fail
          echo '#!/bin/bash' > node_modules/@vscode/ripgrep/bin/rg
          echo 'exit 0' >> node_modules/@vscode/ripgrep/bin/rg
          chmod +x node_modules/@vscode/ripgrep/bin/rg
          echo "✅ Created ripgrep placeholder"
          
          # Dugite git binary dir
          mkdir -p node_modules/dugite/git/bin
          echo '#!/bin/bash' > node_modules/dugite/git/bin/git
          echo 'exit 0' >> node_modules/dugite/git/bin/git
          chmod +x node_modules/dugite/git/bin/git
          echo '#!/bin/bash' > node_modules/dugite/git/bin/scalar
          echo 'exit 0' >> node_modules/dugite/git/bin/scalar
          chmod +x node_modules/dugite/git/bin/scalar
          echo "✅ Created dugite git placeholder"

      - name: Apply FREE_AGENT_QUOTA_LIMIT patch
        working-directory: ./dyad-src
        run: |
          sed -i '' 's/FREE_AGENT_QUOTA_LIMIT = 10/FREE_AGENT_QUOTA_LIMIT = 99999/' src/lib/free_agent_quota_limit.ts
          echo "Patched: FREE_AGENT_QUOTA_LIMIT = 99999"

      - name: Build Dyad (DMG)
        working-directory: ./dyad-src
        run: npm run make
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          E2E_TEST_BUILD: "true"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dyad-unlimited-agent-dmg
          path: dyad-src/out/make/*.dmg
          if-no-files-found: error
